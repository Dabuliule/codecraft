name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Read release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(uv run python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          prerelease="$(VERSION="${version}" uv run python -c 'import os; from packaging.version import Version; print(str(Version(os.environ["VERSION"]).is_prerelease).lower())')"
          notes_file="docs/releases/v${version}.md"
          notes_file_zh="docs/releases/v${version}.zh-CN.md"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          echo "notes_file_zh=${notes_file_zh}" >> "${GITHUB_OUTPUT}"

      - name: Validate release notes
        shell: bash
        run: |
          set -euo pipefail

          for notes_file in \
            "${{ steps.release.outputs.notes_file }}" \
            "${{ steps.release.outputs.notes_file_zh }}"
          do
            if [ ! -s "${notes_file}" ]; then
              echo "Release notes are required at ${notes_file}."
              exit 1
            fi
          done

      - name: Validate release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.release.outputs.version }}"
          tag="${GITHUB_REF_NAME}"

          if [ "${tag}" != "v${version}" ]; then
            echo "Release tag ${tag} does not match pyproject.toml version ${version}."
            echo "Create tag v${version}, or update pyproject.toml before releasing."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release tag ${tag} must point to a commit contained in origin/main."
            exit 1
          fi

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Clean package artifacts
        run: rm -rf dist build src/*.egg-info

      - name: Build package
        run: uv build

      - name: Check package
        run: uvx twine check dist/*

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: codecraft-dist
          path: dist/*

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_args=(
            --verify-tag
            --title "${GITHUB_REF_NAME}"
            --notes-file "${{ steps.release.outputs.notes_file }}"
          )
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            release_args+=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}" dist/* "${release_args[@]}"
