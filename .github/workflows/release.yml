name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Validate release tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          version="$(uv run python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])')"
          tag="${GITHUB_REF_NAME}"

          if [ "${tag}" != "v${version}" ]; then
            echo "Release tag ${tag} does not match pyproject.toml version ${version}."
            echo "Create tag v${version}, or update pyproject.toml before releasing."
            exit 1
          fi

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Clean package artifacts
        run: rm -rf dist build src/*.egg-info

      - name: Build package
        run: uv build

      - name: Check package
        run: uvx twine check dist/*

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: codecraft-dist
          path: dist/*

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
